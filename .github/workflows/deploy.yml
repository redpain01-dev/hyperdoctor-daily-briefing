name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # 매일 20:30 UTC = 한국시간(KST) 05:30. 콘텐츠를 새로 구운 뒤
    # 그날 아침 단톡방에 공유하는 흐름에 맞춘 시각.
    - cron: "30 20 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build (static export)
        env:
          KMA_SERVICE_KEY: ${{ secrets.KMA_SERVICE_KEY }}
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
