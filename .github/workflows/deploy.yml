name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # GitHub Actions 예약 실행(cron)은 정시에 도는 게 보장되지 않고 실제로
    # 몇 시간씩 늦게 도는 경우가 흔하다(관측: 05:30 예약 → 08:47 실행).
    # 그래서 한 번만 예약하지 않고, 한국시간 새벽 2시~7시 30분 사이 30분마다
    # 반복 실행해서 그 안에 최소 한 번은 확실히 성공하도록 한다.
    # (public 저장소라 Actions 실행 시간에 비용이 들지 않는다.)
    - cron: "0,30 17-22 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build (static export)
        env:
          KMA_SERVICE_KEY: ${{ secrets.KMA_SERVICE_KEY }}
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
